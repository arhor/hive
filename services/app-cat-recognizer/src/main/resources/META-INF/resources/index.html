<!DOCTYPE html>
<!--suppress CssUnusedSymbol -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Detector</title>
    <style>
        body {
            background: #111;
            color: #eee;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
            margin: 0;
        }
        h1 { margin-bottom: 8px; font-size: 1.2rem; }
        h2 {
            margin: 8px 0;
            font-size: 1rem;
        }

        #view-switcher {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        #view-switcher button {
            padding: 6px 12px;
            border: 1px solid #555;
            border-radius: 4px;
            background: #222;
            color: #eee;
            cursor: pointer;
            font: inherit;
        }

        #view-switcher button.active {
            background: #444;
            border-color: #888;
        }
        #status-bar {
            margin-bottom: 12px;
            padding: 6px 16px;
            border-radius: 4px;
            font-size: 1rem;
            background: #333;
        }
        #status-bar.detected { background: #8b0000; }
        #status-bar.absent   { background: #1a4a1a; }
        #status-bar.unknown  { background: #333; }
        #frame-container,
        #upload-frame-container {
            position: relative;
            display: inline-block;
        }
        #frame-img,
        #upload-img {
            display: block;
            max-width: 90vw;
        }
        #bbox-canvas,
        #upload-bbox-canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }
        #meta {
            margin-top: 10px;
            font-size: 0.8rem;
            color: #aaa;
        }

        .view-section {
            margin-top: 20px;
            width: min(90vw, 720px);
            text-align: center;
        }
        #upload-form {
            margin-bottom: 12px;
        }
        #upload-status {
            margin-bottom: 12px;
            padding: 6px 16px;
            border-radius: 4px;
            background: #333;
        }
        #upload-status.detected { background: #8b0000; }
        #upload-status.absent   { background: #1a4a1a; }
        #upload-status.unknown  { background: #333; }
        #upload-img:not([src]) {
            display: none;
        }
    </style>
</head>
<body>
<h1>Cat Detector</h1>
<div id="view-switcher">
    <button id="upload-view-button" type="button">Upload test image</button>
    <button id="live-view-button" type="button">Live view</button>
</div>

<section class="view-section" hidden id="live-section">
    <h2>Live view</h2>
    <div id="status-bar" class="unknown">Waiting for data…</div>
    <div id="frame-container">
        <img alt="Latest frame" id="frame-img"/>
        <canvas id="bbox-canvas"></canvas>
    </div>
    <div id="meta"></div>
</section>

<section class="view-section" hidden id="upload-section">
        <h2>Upload test image</h2>
        <form id="upload-form">
            <input id="upload-input" type="file" accept="image/*" required>
            <button id="upload-button" type="submit">Detect cat</button>
        </form>
        <div id="upload-status" class="unknown">Choose an image to test</div>
        <div id="upload-frame-container">
            <img id="upload-img" alt="Uploaded test image preview">
            <canvas id="upload-bbox-canvas"></canvas>
        </div>
    </section>

    <script>
        const liveSection = document.getElementById('live-section');
        const liveViewButton = document.getElementById('live-view-button');
        const uploadViewButton = document.getElementById('upload-view-button');

        const img       = document.getElementById('frame-img');
        const canvas    = document.getElementById('bbox-canvas');
        const ctx       = canvas.getContext('2d');
        const statusBar = document.getElementById('status-bar');
        const meta      = document.getElementById('meta');

        const uploadSection = document.getElementById('upload-section');
        const uploadForm    = document.getElementById('upload-form');
        const uploadInput   = document.getElementById('upload-input');
        const uploadButton  = document.getElementById('upload-button');
        const uploadImg     = document.getElementById('upload-img');
        const uploadCanvas  = document.getElementById('upload-bbox-canvas');
        const uploadCtx     = uploadCanvas.getContext('2d');
        const uploadStatus  = document.getElementById('upload-status');

        let pendingBoxes = [];
        let uploadBoxes  = [];
        let uploadPreviewUrl = null;
        let uploadEnabled = false;
        let activeView = 'upload';
        let livePollIntervalId = null;

        function setActiveView(view) {
            activeView = view === 'upload' && uploadEnabled ? 'upload' : 'live';

            liveSection.hidden = activeView !== 'live';
            uploadSection.hidden = !uploadEnabled || activeView !== 'upload';
            liveViewButton.classList.toggle('active', activeView === 'live');
            uploadViewButton.classList.toggle('active', activeView === 'upload');

            if (activeView === 'live') {
                startLivePolling();
            } else {
                stopLivePolling();
            }

            if (activeView === 'live' && img.complete && img.naturalWidth > 0) {
                drawBoxes();
            } else if (activeView === 'upload' && uploadImg.naturalWidth > 0) {
                drawUploadBoxes();
            }
        }

        function drawBoxSet(targetImg, targetCanvas, targetCtx, boxes) {
            targetCanvas.width  = targetImg.naturalWidth;
            targetCanvas.height = targetImg.naturalHeight;
            targetCanvas.style.width  = targetImg.width  + 'px';
            targetCanvas.style.height = targetImg.height + 'px';

            targetCtx.clearRect(0, 0, targetCanvas.width, targetCanvas.height);

            targetCtx.strokeStyle = 'red';
            targetCtx.lineWidth   = 3;

            for (const box of boxes) {
                targetCtx.strokeRect(box.x, box.y, box.width, box.height);
            }
        }

        function drawBoxes() {
            drawBoxSet(img, canvas, ctx, pendingBoxes);
        }

        function drawUploadBoxes() {
            drawBoxSet(uploadImg, uploadCanvas, uploadCtx, uploadBoxes);
        }

        function renderStatus(target, data) {
            switch (data.status) {
                case 'DETECTED':
                    target.textContent = 'Cat detected' +
                        (data.confidence != null
                            ? ' (' + (data.confidence * 100).toFixed(0) + '%)'
                            : '');
                    target.className = 'detected';
                    break;
                case 'NOT_DETECTED':
                    target.textContent = 'No cat detected';
                    target.className = 'absent';
                    break;
                default:
                    target.textContent = data.error
                        ? 'Unknown (' + data.error.code + ')'
                        : 'Unknown';
                    target.className = 'unknown';
            }
        }

        img.addEventListener('load', drawBoxes);
        uploadImg.addEventListener('load', drawUploadBoxes);
        window.addEventListener('resize', () => {
            drawBoxes();
            if (uploadImg.naturalWidth > 0) drawUploadBoxes();
        });

        async function loadDebugConfig() {
            try {
                const res = await fetch('/api/debug/config');
                if (!res.ok) {
                    uploadViewButton.hidden = true;
                    setActiveView('live');
                    return;
                }

                const data = await res.json();
                uploadEnabled = data.uploadEnabled === true;
                uploadViewButton.hidden = !uploadEnabled;
                setActiveView(uploadEnabled ? 'upload' : 'live');
            } catch (err) {
                uploadEnabled = false;
                uploadViewButton.hidden = true;
                setActiveView('live');
            }
        }

        async function poll() {
            if (activeView !== 'live') return;

            try {
                const res  = await fetch('/api/recognition/latest');
                const data = await res.json();
                if (activeView !== 'live') return;

                pendingBoxes = data.boundingBoxes || [];

                const ts = data.observedAt
                    ? new Date(data.observedAt).toLocaleTimeString()
                    : '—';

                renderStatus(statusBar, data);

                meta.textContent = 'Last updated: ' + ts +
                    ' | Failures: ' + (data.worker ? data.worker.consecutiveFailures : '—');

                img.src = '/api/frame/latest?t=' + Date.now();
                if (img.complete && img.naturalWidth > 0) drawBoxes();

            } catch (err) {
                statusBar.textContent = 'Connection error';
                statusBar.className = 'unknown';
            }
        }

        function startLivePolling() {
            if (livePollIntervalId != null) return;

            poll();
            livePollIntervalId = setInterval(poll, 5000);
        }

        function stopLivePolling() {
            if (livePollIntervalId == null) return;

            clearInterval(livePollIntervalId);
            livePollIntervalId = null;
        }

        uploadInput.addEventListener('change', () => {
            uploadBoxes = [];
            uploadCtx.clearRect(0, 0, uploadCanvas.width, uploadCanvas.height);

            const file = uploadInput.files[0];
            if (!file) return;

            if (uploadPreviewUrl != null) {
                URL.revokeObjectURL(uploadPreviewUrl);
            }
            uploadPreviewUrl = URL.createObjectURL(file);
            uploadImg.src = uploadPreviewUrl;
            uploadStatus.textContent = 'Ready to test';
            uploadStatus.className = 'unknown';
        });

        liveViewButton.addEventListener('click', () => setActiveView('live'));
        uploadViewButton.addEventListener('click', () => setActiveView('upload'));

        uploadForm.addEventListener('submit', async (event) => {
            event.preventDefault();

            const file = uploadInput.files[0];
            if (!file) return;

            uploadButton.disabled = true;
            uploadStatus.textContent = 'Detecting...';
            uploadStatus.className = 'unknown';

            try {
                const body = new FormData();
                body.append('image', file);

                const res = await fetch('/api/recognition/upload', {
                    method: 'POST',
                    body,
                });

                if (!res.ok) {
                    uploadStatus.textContent = 'Upload failed (' + res.status + ')';
                    uploadStatus.className = 'unknown';
                    return;
                }

                const data = await res.json();
                uploadBoxes = data.boundingBoxes || [];
                renderStatus(uploadStatus, data);
                drawUploadBoxes();
            } catch (err) {
                uploadStatus.textContent = 'Upload failed';
                uploadStatus.className = 'unknown';
            } finally {
                uploadButton.disabled = false;
            }
        });

        loadDebugConfig();
    </script>
</body>
</html>
