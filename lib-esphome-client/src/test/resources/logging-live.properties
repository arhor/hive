# JUL config for live integration tests
handlers=java.util.logging.ConsoleHandler
.level=WARNING

java.util.logging.ConsoleHandler.level=FINE
java.util.logging.ConsoleHandler.formatter=java.util.logging.SimpleFormatter
java.util.logging.SimpleFormatter.format=%1$tH:%1$tM:%1$tS.%1$tL [%4$s] %3$s - %5$s%6$s%n

# ESPHome async client — FINE shows the full connection pipeline
io.github.arhor.esphome.client.async.level=FINE
