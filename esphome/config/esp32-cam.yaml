esphome:
    name: esp32-cam
    friendly_name: esp32-cam

esp32:
    board: esp32cam
    framework:
        type: arduino

psram:

logger:

api:

ota:
    -   platform: esphome
        password: "d14bcfccf4319f9cda8864f3110bb508"

wifi:
    ssid: !secret wifi_ssid
    password: !secret wifi_password

    ap:
        ssid: "Esp32-Cam Fallback Hotspot"
        password: "ydWSWhBWr5gx"

captive_portal:

time:
    -   platform: homeassistant
        id: homeassistant_time

output:
    -   platform: gpio
        pin: GPIO4
        id: camera_flash

light:
    -   platform: binary
        name: "ESP32-CAM Flash"
        output: camera_flash
        restore_mode: ALWAYS_OFF

esp32_camera:
    name: "ESP32-CAM"

    external_clock:
        pin: GPIO0
        frequency: 20MHz

    i2c_pins:
        sda: GPIO26
        scl: GPIO27

    data_pins:
        - GPIO5
        - GPIO18
        - GPIO19
        - GPIO21
        - GPIO36
        - GPIO39
        - GPIO34
        - GPIO35

    vsync_pin: GPIO25
    href_pin: GPIO23
    pixel_clock_pin: GPIO22
    power_down_pin: GPIO32

    resolution: 640X480
    jpeg_quality: 12
    max_framerate: 5 fps
    idle_framerate: 0.2 fps

    vertical_flip: true
    horizontal_mirror: false

esp32_camera_web_server:
    -   port: 8080
        mode: stream
    -   port: 8081
        mode: snapshot

sensor:
    -   platform: wifi_signal
        name: "WiFi Signal"
        update_interval: 60s

button:
    -   platform: restart
        name: "Restart"
